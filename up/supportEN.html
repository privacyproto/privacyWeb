<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Technical Support</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        h2 {
            color: #1a73e8;
            margin-top: 0;
        }
        p {
            margin: 15px 0;
            color: #5f6368;
        }
        .email-link {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #1a73e8;
            color: #ffffff;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .email-link:hover {
            background-color: #1557b0;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.9em;
            color: #9aa0a6;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Application Technical Support</h2>
    <p>Thank you for using <strong>"ExitLens"</strong>.</p>
    <p>If you encounter any issues during use or have any suggestions, please feel free to contact us via:</p>
    
    <a href="mailto:zhangleme@outlook.com" class="email-link">Email: zhangleme@outlook.com</a>
    
    <p class="footer">We will get back to you as soon as possible.</p>

</html>
